<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 140">
  <rect width="200" height="140" fill="#f8fafc"/>
  <!-- Chain of redirect arrows -->
  <!-- Node 1: 301 -->
  <circle cx="30" cy="55" r="18" fill="#004c4c"/>
  <circle cx="30" cy="55" r="13" fill="#e8f4f4"/>
  <rect x="20" y="52" width="20" height="5" rx="2" fill="#66b2b2"/>
  <!-- Arrow 1→2 -->
  <line x1="50" y1="55" x2="72" y2="55" stroke="#66b2b2" stroke-width="3" stroke-linecap="round"/>
  <polygon points="72,49 82,55 72,61" fill="#66b2b2"/>
  <!-- Checkmark above arrow 1 -->
  <path d="M60 38 L64 43 L72 34" fill="none" stroke="#198754" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Node 2: 301 -->
  <circle cx="100" cy="55" r="18" fill="#004c4c"/>
  <circle cx="100" cy="55" r="13" fill="#e8f4f4"/>
  <rect x="90" y="52" width="20" height="5" rx="2" fill="#66b2b2"/>
  <!-- Arrow 2→3 -->
  <line x1="120" y1="55" x2="142" y2="55" stroke="#fbb03b" stroke-width="3" stroke-linecap="round"/>
  <polygon points="142,49 152,55 142,61" fill="#fbb03b"/>
  <!-- Warning above arrow 2 -->
  <path d="M130 38 L134 43 L142 34" fill="none" stroke="#198754" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Node 3: 404 error -->
  <circle cx="170" cy="55" r="18" fill="#dc3545" opacity="0.15"/>
  <circle cx="170" cy="55" r="18" fill="none" stroke="#dc3545" stroke-width="3"/>
  <circle cx="170" cy="55" r="13" fill="#fff"/>
  <rect x="160" y="52" width="20" height="5" rx="2" fill="#dc3545"/>
  <!-- Cross mark above node 3 -->
  <line x1="163" y1="28" x2="177" y2="36" stroke="#dc3545" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="177" y1="28" x2="163" y2="36" stroke="#dc3545" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Chain links decoration bottom -->
  <path d="M25 90 Q25 85 30 85 L40 85 Q45 85 45 90 Q45 95 40 95 L30 95 Q25 95 25 90 Z" fill="none" stroke="#66b2b2" stroke-width="2"/>
  <path d="M42 90 Q42 85 47 85 L57 85 Q62 85 62 90 Q62 95 57 95 L47 95 Q42 95 42 90 Z" fill="none" stroke="#66b2b2" stroke-width="2"/>
  <path d="M59 90 Q59 85 64 85 L74 85 Q79 85 79 90 Q79 95 74 95 L64 95 Q59 95 59 90 Z" fill="none" stroke="#fbb03b" stroke-width="2"/>
  <!-- Broken chain link -->
  <path d="M80 88 L86 85" stroke="#dc3545" stroke-width="2" stroke-linecap="round"/>
  <path d="M90 90 Q90 85 95 85 L105 85 Q110 85 110 90 Q110 95 105 95 L95 95 Q90 95 90 90 Z" fill="none" stroke="#dc3545" stroke-width="2" stroke-dasharray="3 2"/>
</svg>